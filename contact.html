<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Flipwise Renovations</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header>
    <h1>Flipwise Renovations</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="team.html">Team</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>Contact Us</h2>
      <p>
        If you're planning a renovation and want a reliable, professional team, we’d be happy to hear from you.
      </p>
      <p>
        Email us directly at
        <a href="mailto:info@flipwisereno.com">info@flipwisereno.com</a>.
      </p>
    </section>

    <section>
      <h3>Send a Message</h3>
      <form>
        <label for="name">Name</label><br>
        <input type="text" id="name" name="name" placeholder="Your name" required><br><br>

        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" placeholder="Your email" required><br><br>

        <label for="message">Message</label><br>
        <textarea id="message" name="message" rows="6" placeholder="Tell us about your project" required></textarea><br><br>

        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer>
    <p>© Flipwise Renovations | info@flipwisereno.com</p>
  </footer>
</body>
</html>
